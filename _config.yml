# Welcome to Jekyll!
# Main configuration for Anantha Krishnan Orunnukaran Mani's Academic Pages site.
# Repository: https://github.com/ananthkrishna96/ananthkrishna96.github.io

# Basic Site Settings
locale                   : "en-US"
site_theme               : "default"
title                    : "Anantha Krishnan Orunnukaran Mani"
title_separator          : "-"
name                     : &name "Anantha Krishnan Orunnukaran Mani"
description              : &description "PhD Researcher in computational mechanics, reduced-order modeling, scientific computing, and scientific machine learning."
url                      : "https://ananthkrishna96.github.io"
baseurl                  : ""
repository               : "ananthkrishna96/ananthkrishna96.github.io"

# Site Author
# Avoid publishing full street address, phone number, passport/residence details, or other private data.
author:
  avatar           : "anantha_profile.jpg"
  name             : "Anantha Krishnan Orunnukaran Mani"
  pronouns         :
  bio              : "PhD Researcher at SISSA working on computational mechanics, reduced-order modeling, scientific computing, and scientific machine learning."
  location         : "Trieste, Italy"
  employer         : "SISSA"
  uri              : "https://ananthkrishna96.github.io"
  email            : "ananthakrishnanom@gmail.com"

  # Academic websites
  academia         :
  arxiv            :
  googlescholar    :
  inspire-hep      :
  impactstory      :
  orcid            :
  semantic         :
  ssrn             :
  pubmed           :
  researchgate     :
  scopus           :
  zotero           :

  # Repositories and software development
  bitbucket        :
  codepen          :
  dribbble         :
  github           : "ananthkrishna96"
  gitlab           : "ananth96"
  kaggle           :
  stackoverflow    :

  # Social media
  artstation       :
  bluesky          :
  facebook         :
  flickr           :
  foursquare       :
  goodreads        :
  google_plus      :
  keybase          :
  instagram        :
  lastfm           :
  linkedin         : "au4702"
  mastodon         :
  medium           :
  pinterest        :
  soundcloud       :
  steam            :
  telegram         :
  tumblr           :
  twitter          :
  vine             :
  weibo            :
  wikipedia        :
  xing             :
  youtube          :
  zhihu            :

  # Custom links added in _includes/author-profile.html
  cv               : "/files/Anantha_Krishnan_CV_2026_Public.pdf"

# Publication Category
publication_category:
  theses:
    title: "Theses"
  manuscripts:
    title: "Manuscripts and Preprints"
  conferences:
    title: "Conference Papers and Proceedings"

# Site Settings
teaser                   :
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false
comments:
  provider               :
atom_feed:
  hide                   : true
  path                   :

# SEO Related
google_site_verification :
bing_site_verification   :
alexa_site_verification  :
yandex_site_verification :

# Social Sharing
twitter:
  username               :
facebook:
  username               :
  app_id                 :
  publisher              :
og_image                 : "anantha_profile.jpg"
og_description           : "Academic and research website of Anantha Krishnan Orunnukaran Mani."
social:
  type                   : Person
  name                   : "Anantha Krishnan Orunnukaran Mani"
  links:
    - "https://github.com/ananthkrishna96"
    - "https://gitlab.com/ananth96"
    - "https://www.linkedin.com/in/au4702"

# Analytics
analytics:
  provider               : "false"

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: false
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: false
      comments: false
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: false
      comments: false
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: false
      comment: false
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Europe/Rome

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# GitHub Pages allowlist
whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
